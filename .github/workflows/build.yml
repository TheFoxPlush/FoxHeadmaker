name: Build Executables (PyInstaller)

on:
  workflow_dispatch: #manual triggering for now

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
        shell: bash

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --icon "logo.ico" main.py
        shell: bash

      - name: Rename binary (OS-specific)
        run: |
          mkdir dist_final
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/main.exe dist_final/myapp-windows.exe
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/main dist_final/myapp-macos
          else
            mv dist/main dist_final/myapp-linux
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-${{ matrix.os }}
          path: dist_final/*
